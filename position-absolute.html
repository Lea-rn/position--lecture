<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      img {
        width: 90%;
      }

      h1 {
        color: red;
        position: absolute;
        bottom: 100px;
        left: 1000px;

        position: relative;
      }

    <div>
      <img src="https://www.w3schools.com/css/img_5terre_wide.jpg" alt="" />
      <h1>position absolute</h1>
    </div>
