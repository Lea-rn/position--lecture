<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        background-color: #333333;
        color: #ffffff;
        height: 3000px;
      }

      section {
        border: 2px solid red;
        height: 500px;
      }
      .sticky {
        font-size: 30px;
        color: royalblue;
        position: sticky;

        top: 50px;
      }
      .sticky-container {
        border: solid 3px blue;
      }
    </style>
  </head>
  <body>
    <section class="sticky-container">
      <h1>hello</h1>
      <p class="sticky">salem</p>
      <h2>position lecture</h2>
    </section>

    <section>
      <h1>hello</h1>
      <p>salem</p>
      <h2>position lecture</h2>
    </section>
  </body>
</html>
