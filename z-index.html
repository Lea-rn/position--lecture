<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        color: rgb(33, 32, 32);
        border-radius: 10px;
        text-align: center;
      }
      h1 {
        background-color: royalblue;
        padding: 60px;

        /* Note :  u should use position: relative with z-index */
        /* position: relative;
        z-index: 4; */
      }

      h2 {
        background-color: greenyellow;
        padding: 40px;
        position: relative;
        bottom: 160px;
        z-index: 3;
      }

      h3 {
        background-color: orangered;
        padding: 20px;
        position: relative;
        bottom: 260px;
        z-index: 2;
      }
    </style>
  </head>
  <body>
    <h1>hello</h1>
    <h2>bonjour</h2>
    <h3>salem</h3>
  </body>
</html>
